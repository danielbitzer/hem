name: Home Energy Manager
version: 0.4.0
slug: hem
description: MILP battery/solar optimizer for Amber Electric dynamic pricing
url: https://github.com/danielbitzer/hem
image: ghcr.io/danielbitzer/hem-{arch}
arch:
  - aarch64
  - amd64
init: true
homeassistant_api: true
hassio_api: false
ingress: true
ingress_port: 8099
panel_icon: mdi:battery-charging
panel_title: Energy Manager
watchdog: http://[HOST]:[PORT:8099]/health
options:
  log_level: info
schema:
  log_level: list(debug|info|warning|error)
