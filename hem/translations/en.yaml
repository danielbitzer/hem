configuration:
  price_source:
    name: Price source
    description: Which Amber integration provides prices (amber_express recommended).
  entities:
    name: Input entities
    description: Entity IDs for prices, solar forecast, battery state and weather.
  battery:
    name: Battery parameters
    description: >-
      Capacity, battery-side power limits (wear-conscious), efficiency, SoC
      bounds and wear cost. See the Documentation tab for each field.
  grid:
    name: Grid connection limits
    description: >-
      Net import/export limits at the meter (connection capacity and DNSP
      export limit) — distinct from the battery power limits.
  load_profile:
    name: Load profile
    description: Hourly baseline load and temperature-dependent rules.
  optimizer:
    name: Optimizer settings
    description: Horizon, solver timeout and behavioral thresholds.
  spike:
    name: Spike strategy
    description: SoC reserve behavior when Amber flags potential price spikes.
  control:
    name: Control mode
    description: dry_run publishes recommendations only; active writes to the inverter.
  log_level:
    name: Log level
    description: Logging verbosity.
