<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HEM — Home Energy Manager</title>
<script src="./static/apexcharts.min.js"></script>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f7f7f9; --card: #ffffff; --text: #1c1c1e; --muted: #6e6e73; --border: #e3e3e8;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #111113; --card: #1c1c1f; --text: #ececf0; --muted: #9a9aa2; --border: #2c2c30; }
  }
  * { box-sizing: border-box; }
  body { margin: 0; padding: 16px; background: var(--bg); color: var(--text);
         font: 14px/1.45 system-ui, -apple-system, sans-serif; }
  h1 { font-size: 18px; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 12px; margin-bottom: 16px; }
  .tiles { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
  .tile { background: var(--card); border: 1px solid var(--border); border-radius: 10px;
          padding: 10px 16px; min-width: 130px; }
  .tile .k { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
  .tile .v { font-size: 20px; font-weight: 600; margin-top: 2px; }
  .tile .s { color: var(--muted); font-size: 11px; margin-top: 2px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px;
          padding: 12px; margin-bottom: 14px; }
  .card h2 { font-size: 13px; margin: 0 0 4px; color: var(--muted); font-weight: 600; }
  #error { color: #c0392b; padding: 24px; text-align: center; display: none; }
  #warning { display: none; background: rgba(230, 126, 34, 0.12); border: 1px solid #e67e22;
             color: inherit; border-radius: 10px; padding: 10px 14px; margin-bottom: 14px;
             font-size: 13px; }
  .action-charge { color: #2e86de; } .action-discharge { color: #10ac84; }
  .action-idle { color: var(--muted); } .action-curtail { color: #e67e22; }
  .action-no_charge { color: #8e44ad; }
</style>
</head>
<body>
<h1>Home Energy Manager</h1>
<div class="sub" id="meta">loading…</div>
<div class="sub" id="load-meta" style="display:none"></div>
<div id="error"></div>
<div id="warning"></div>
<div class="tiles" id="tiles" style="display:none">
  <div class="tile"><div class="k">Action now</div><div class="v" id="t-action">–</div></div>
  <div class="tile"><div class="k">Amber buy / sell</div><div class="v" id="t-price">–</div>
    <div class="s" id="t-price-period"></div></div>
  <div class="tile"><div class="k">Battery setpoint</div><div class="v" id="t-power">–</div></div>
  <div class="tile"><div class="k">SoC target</div><div class="v" id="t-soc">–</div></div>
  <div class="tile"><div class="k">Horizon cost</div><div class="v" id="t-cost">–</div></div>
  <div class="tile"><div class="k">Forecast load</div><div class="v" id="t-load">–</div></div>
</div>
<div class="card"><h2>Prices $/kWh (buy / sell)</h2><div id="chart-prices"></div></div>
<div class="card"><h2>Forecast kW (PV / load)</h2><div id="chart-power"></div></div>
<div class="card"><h2>Planned mode</h2><div id="chart-mode"></div></div>
<div class="card"><h2>Planned battery power kW (+charge / −discharge) &amp; grid flows</h2><div id="chart-battery"></div></div>
<div class="card"><h2>Planned state of charge kWh</h2><div id="chart-soc"></div></div>

<script>
const charts = {};
// Latest mode-strip segments; the tooltip callback reads from here because
// Apex's own config copy loses the custom `action` field after updateSeries.
let modeSegments = [];
const dark = matchMedia("(prefers-color-scheme: dark)").matches;
// Fixed y-axis label column so every chart's plot area starts at the same x
// and the datetime axes line up (incl. the label-less mode strip).
const GUTTER = 56;

function base(id, extra) {
  return Object.assign({
    chart: { id, height: 220, type: "line", background: "transparent",
             animations: { enabled: false }, toolbar: { show: false },
             zoom: { enabled: false }, group: "hem" },
    theme: { mode: dark ? "dark" : "light" },
    xaxis: { type: "datetime", labels: { datetimeUTC: false } },
    yaxis: { labels: { minWidth: GUTTER, maxWidth: GUTTER } },
    tooltip: { x: { format: "ddd HH:mm" } },
    stroke: { width: 2, curve: "stepline" },
    dataLabels: { enabled: false },
    legend: { position: "top", horizontalAlign: "left" },
    grid: { borderColor: dark ? "#2c2c30" : "#e3e3e8" },
  }, extra || {});
}

// Create once, then only push data — rebuilding options on refresh resets
// chart type/colors (the "bar chart turns into a line chart" bug).
// Annotations use the per-instance API: updateOptions propagates across
// charts sharing a group, leaking the "forecast padded" band to all charts.
function render(el, options, series, annotations) {
  if (!charts[el]) {
    options.series = series;
    if (annotations) options.annotations = annotations;
    charts[el] = new ApexCharts(document.querySelector("#" + el), options);
    charts[el].render();
    return;
  }
  charts[el].updateSeries(series, false);
  if (annotations) {
    charts[el].clearAnnotations();
    for (const a of annotations.xaxis || []) charts[el].addXaxisAnnotation(a, false);
  }
}

async function refresh() {
  let plan;
  try {
    const resp = await fetch("./api/plan", { cache: "no-store" });
    if (!resp.ok) throw new Error((await resp.json()).error || resp.statusText);
    plan = await resp.json();
  } catch (e) {
    let msg = "No plan yet: " + e.message;
    try {
      const health = await (await fetch("./health", { cache: "no-store" })).json();
      if (health.last_error) msg += " — last cycle error: " + health.last_error;
    } catch {}
    document.querySelector("#error").textContent = msg;
    document.querySelector("#error").style.display = "block";
    return;
  }
  document.querySelector("#error").style.display = "none";
  document.querySelector("#tiles").style.display = "flex";

  const iv = plan.intervals;
  const t = iv.map(x => new Date(x.start).getTime());
  const pt = (vals) => vals.map((v, i) => [t[i], Math.round(v * 1000) / 1000]);
  const step0 = iv[0];

  const computed = new Date(plan.computed_at);
  const meta = plan.meta || {};
  let metaText =
    `computed ${computed.toLocaleString()} · ${plan.solver_status} · ${Math.round(plan.solve_ms)} ms · ${iv.length} intervals`;
  const forecastEnd = meta.price_forecast_end ? new Date(meta.price_forecast_end).getTime() : null;
  if (forecastEnd && forecastEnd < t[t.length - 1]) {
    metaText += ` · price forecast ends ${new Date(forecastEnd).toLocaleString()} (tail is held flat)`;
  }
  document.querySelector("#meta").textContent = metaText;
  const lf = meta.load_forecast_info || {};
  const lfEl = document.querySelector("#load-meta");
  if (meta.load_forecast === "learned" && lf.window_days) {
    let s = `load forecast: learned from ${Math.round(lf.window_days)} days of `
          + `${lf.source} (${lf.load_entity}) · ${lf.buckets} hour buckets`;
    s += lf.temp_response
      ? ` · temperature response from ${lf.temp_entity} — up to `
        + `${lf.heat_kw_per_deg} kW/°C heating, ${lf.cool_kw_per_deg} kW/°C cooling`
      : " · no temperature response";
    lfEl.textContent = s;
    lfEl.style.display = "block";
  } else {
    lfEl.style.display = "none";
  }
  const warnEl = document.querySelector("#warning");
  if (meta.load_forecast && meta.load_forecast !== "learned") {
    warnEl.textContent = meta.load_forecast === "unconfigured"
      ? "⚠ Load forecasting unavailable — no house load sensor configured (entities.load_power). "
        + "Plans assume ZERO house load; consider raising battery.soc_min until learning is set up."
      : "⚠ Load forecast not learned yet — waiting for usable history from the load sensor. "
        + "Plans assume ZERO house load; consider raising battery.soc_min until learning kicks in.";
    warnEl.style.display = "block";
  } else {
    warnEl.style.display = "none";
  }
  const actionEl = document.querySelector("#t-action");
  actionEl.textContent = step0.action;
  actionEl.className = "v action-" + step0.action;
  // the live prices the current action was optimized against ($/kWh, same
  // convention as the price chart), and the interval they apply to
  document.querySelector("#t-price").textContent =
    "$" + step0.buy.toFixed(3) + " / $" + step0.sell.toFixed(3);
  const fmtHm = (d) => new Date(d).toLocaleTimeString(undefined,
    { hour: "2-digit", minute: "2-digit" });
  document.querySelector("#t-price-period").textContent =
    fmtHm(step0.start) + " – " + fmtHm(step0.end);
  // only forced charge/discharge carry a real commanded setpoint; every other
  // mode runs under self-consumption, so a kW figure would be fiction
  document.querySelector("#t-power").textContent =
    (step0.action === "charge" || step0.action === "discharge")
      ? step0.power_kw.toFixed(2) + " kW" : "—";
  const cap = meta.capacity_kwh;
  document.querySelector("#t-soc").textContent = cap
    ? (100 * step0.soc_end / cap).toFixed(0) + "% · " + step0.soc_end.toFixed(1) + " kWh"
    : step0.soc_end.toFixed(1) + " kWh";
  document.querySelector("#t-cost").textContent = "$" + plan.objective_cost.toFixed(2);
  const loadKwh = iv.reduce(
    (sum, x) => sum + x.load_kw * (new Date(x.end) - new Date(x.start)) / 3600000, 0);
  const horizonH = (new Date(iv[iv.length - 1].end) - new Date(iv[0].start)) / 3600000;
  document.querySelector("#t-load").textContent =
    loadKwh.toFixed(1) + " kWh / " + Math.round(horizonH) + "h";

  const paddedTail = forecastEnd && forecastEnd < t[t.length - 1] ? {
    xaxis: [{
      x: forecastEnd, x2: t[t.length - 1],
      fillColor: dark ? "#5c5c66" : "#9a9aa2", opacity: 0.15,
      label: { text: "forecast padded", style: { color: "var(--muted)", background: "transparent" } },
    }],
  } : {};

  // Planned-mode timeline: one colored segment per contiguous action run.
  // Kept OUT of the "hem" sync group — rangeBar's category axis doesn't
  // share a cursor with the datetime line charts.
  const ACTION_COLORS = { charge: "#2e86de", discharge: "#10ac84",
                          idle: dark ? "#5c5c66" : "#c8c8cd",
                          no_charge: "#8e44ad", curtail: "#e67e22" };
  const segments = [];
  for (const x of iv) {
    const startMs = new Date(x.start).getTime(), endMs = new Date(x.end).getTime();
    const last = segments[segments.length - 1];
    if (last && last.action === x.action && last.y[1] === startMs) {
      last.y[1] = endMs;
    } else {
      segments.push({ x: "mode", y: [startMs, endMs], action: x.action,
                      fillColor: ACTION_COLORS[x.action] || "#8e8e93" });
    }
  }
  modeSegments = segments;
  // Pin the strip's x range to the plan's exact span: Apex pads a rangeBar
  // datetime axis to "nice" hours, which compresses it vs the line charts.
  const planEndMs = new Date(iv[iv.length - 1].end).getTime();
  render("chart-mode", {
    chart: { id: "mode", height: 110, type: "rangeBar", background: "transparent",
             animations: { enabled: false }, toolbar: { show: false }, zoom: { enabled: false } },
    theme: { mode: dark ? "dark" : "light" },
    plotOptions: { bar: { horizontal: true, barHeight: "55%", rangeBarGroupRows: true } },
    xaxis: { type: "datetime", labels: { datetimeUTC: false }, min: t[0], max: planEndMs },
    // reserve the SAME label gutter as the line charts (empty text) so the
    // strip's plot area lines up with them; no border/ticks
    yaxis: { labels: { minWidth: GUTTER, maxWidth: GUTTER, formatter: () => "" },
             axisBorder: { show: false }, axisTicks: { show: false } },
    grid: { borderColor: dark ? "#2c2c30" : "#e3e3e8" },
    dataLabels: { enabled: false },
    legend: { show: false },
    tooltip: {
      followCursor: true,
      custom: ({ dataPointIndex }) => {
        const d = modeSegments[dataPointIndex];
        if (!d) return "";
        const fmt = ms => new Date(ms).toLocaleString(undefined,
          { weekday: "short", hour: "2-digit", minute: "2-digit" });
        return '<div style="padding:6px 10px"><b>' + d.action.replace("_", " ") +
               "</b><br>" + fmt(d.y[0]) + " → " + fmt(d.y[1]) + "</div>";
      },
    },
  }, [{ name: "mode", data: segments }]);
  // render() only pushes series after creation; the range must follow each
  // replan (safe: this chart is not in the sync group, no options leak)
  charts["chart-mode"].updateOptions(
    { xaxis: { min: t[0], max: planEndMs } }, false, false);

  render("chart-prices", base("prices", {
    colors: ["#e74c3c", "#10ac84"],
  }), [
    { name: "buy", data: pt(iv.map(x => x.buy)) },
    { name: "sell", data: pt(iv.map(x => x.sell)) },
  ], paddedTail);

  render("chart-power", base("power", {
    colors: ["#f39c12", "#8e8e93"],
  }), [
    { name: "PV", data: pt(iv.map(x => x.pv_kw)) },
    { name: "load", data: pt(iv.map(x => x.load_kw)) },
  ]);

  // Stepline areas, not bars: grouped bars sit side-by-side (misaligned from
  // their timestamps) and 5-min slots render as hairlines/blobs on a 36h axis.
  render("chart-battery", base("battery", {
    chart: Object.assign(base("battery").chart, { type: "area" }),
    colors: ["#2e86de", "#e74c3c", "#10ac84"],
    stroke: { width: 2, curve: "stepline" },
    fill: { type: "solid", opacity: [0.35, 0.2, 0.2] },
  }), [
    { name: "battery", data: pt(iv.map(x => x.power_kw)) },
    { name: "import", data: pt(iv.map(x => x.grid_import_kw)) },
    { name: "export", data: pt(iv.map(x => -x.grid_export_kw)) },
  ]);

  const socOpts = base("soc", {
    colors: ["#2e86de"],
    stroke: { width: 2, curve: "smooth" },
    fill: { type: "gradient", gradient: { opacityFrom: 0.25, opacityTo: 0.02 } },
    chart: Object.assign(base("soc").chart, { type: "area" }),
  });
  if (cap) {
    // Single kWh axis pinned to capacity, same fixed gutter as every other
    // chart. A second % axis (even floating) makes this Apex build inset the
    // plot, so the % lives in the tooltip instead.
    socOpts.yaxis = { min: 0, max: cap,
      labels: { formatter: v => v.toFixed(0), minWidth: GUTTER, maxWidth: GUTTER } };
    socOpts.tooltip = Object.assign(socOpts.tooltip || {}, {
      y: { formatter: v => v.toFixed(1) + " kWh · " + (100 * v / cap).toFixed(0) + "%" },
    });
  }
  render("chart-soc", socOpts, [{ name: "SoC", data: pt(iv.map(x => x.soc_end)) }]);
}

refresh();
setInterval(refresh, 60_000);
</script>
</body>
</html>
