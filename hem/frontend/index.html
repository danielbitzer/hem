<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>HEM — Home Energy Manager</title>
    <script>
      // Stamp the resolved theme before first paint (index.css keys off it);
      // src/theme.ts owns it from then on.
      (function () {
        var pref = null;
        try {
          pref = localStorage.getItem("hem-theme");
        } catch (e) {}
        var dark =
          pref === "dark" ||
          (pref !== "light" && matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.dataset.theme = dark ? "dark" : "light";
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
